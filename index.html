<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison — Curated Objects</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0D0C0A;
  --card: #111009;
  --gold: #C9A55A;
  --gold-light: #E2C07A;
  --gold-dim: #7A6135;
  --text: #EDE8DF;
  --muted: #6B6357;
  --border: rgba(201,165,90,0.15);
  --border-strong: rgba(201,165,90,0.35);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  min-height: 100vh;
  overflow-x: hidden;
}

body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  z-index: 100;
}

header {
  padding: 4rem 5rem 3.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.header-ornament {
  display: flex;
  align-items: center;
  gap: 1.2rem;
  margin-bottom: 2rem;
}
.ornament-line {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim));
}
.ornament-line.right {
  background: linear-gradient(90deg, var(--gold-dim), transparent);
}
.ornament-diamond {
  width: 5px; height: 5px;
  background: var(--gold);
  transform: rotate(45deg);
}

.wordmark {
  font-family: 'Playfair Display', serif;
  font-size: 3.2rem;
  font-weight: 300;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--text);
  text-align: center;
  line-height: 1;
  animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both;
}
.wordmark em { font-style: italic; color: var(--gold-light); }

.tagline {
  margin-top: 1rem;
  font-size: 0.65rem;
  letter-spacing: 0.45em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
  animation: fadeUp 1.2s 0.15s cubic-bezier(0.16,1,0.3,1) both;
}

.header-border {
  width: 100%;
  height: 1px;
  margin-top: 3rem;
  background: linear-gradient(90deg, transparent, var(--border-strong) 30%, var(--border-strong) 70%, transparent);
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.2rem 5rem;
  border-bottom: 1px solid var(--border);
  animation: fadeUp 1s 0.3s both;
}

.nav-links { display: flex; gap: 2.5rem; list-style: none; }
.nav-links a {
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.3s;
}
.nav-links a:hover { color: var(--gold); }

.nav-cta {
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  border: 1px solid var(--border-strong);
  padding: 0.6rem 1.4rem;
  text-decoration: none;
  transition: background 0.3s, color 0.3s;
}
.nav-cta:hover { background: var(--gold); color: var(--bg); }

.collection-intro {
  padding: 4rem 5rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  animation: fadeUp 1s 0.4s both;
}

.collection-label {
  font-family: 'Playfair Display', serif;
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 0.6rem;
}

.collection-heading {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  font-weight: 300;
  line-height: 1.1;
}
.collection-heading em { font-style: italic; color: var(--gold-light); }

.collection-meta { text-align: right; }
.collection-meta p {
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  line-height: 2;
}

.grid-wrap { padding: 2rem 5rem 5rem; }

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.card {
  background: var(--card);
  overflow: hidden;
  position: relative;
  animation: fadeUp 0.8s both;
  transition: background 0.4s ease;
}
.card:hover { background: #181510; }

.card:nth-child(1){animation-delay:0.5s}
.card:nth-child(2){animation-delay:0.6s}
.card:nth-child(3){animation-delay:0.7s}
.card:nth-child(4){animation-delay:0.8s}
.card:nth-child(5){animation-delay:0.9s}
.card:nth-child(6){animation-delay:1.0s}
.card:nth-child(7){animation-delay:1.1s}
.card:nth-child(8){animation-delay:1.2s}

.img-wrap {
  aspect-ratio: 3/4;
  overflow: hidden;
  position: relative;
}

.img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.9s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.6s ease;
  filter: brightness(0.85) sepia(15%) saturate(0.9);
}
.card:hover .img-wrap img {
  transform: scale(1.07);
  filter: brightness(0.72) sepia(20%) saturate(0.8);
}

.img-wrap::before, .img-wrap::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-color: var(--gold);
  border-style: solid;
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: 2;
}
.img-wrap::before { top:12px; left:12px; border-width:1px 0 0 1px; }
.img-wrap::after  { bottom:12px; right:12px; border-width:0 1px 1px 0; }
.card:hover .img-wrap::before,
.card:hover .img-wrap::after { opacity: 1; }

.badge {
  position: absolute;
  top: 1rem; right: 1rem;
  z-index: 3;
  background: var(--gold);
  color: var(--bg);
  font-size: 0.55rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  padding: 0.3rem 0.7rem;
  font-weight: 400;
}

.card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(13,12,10,0.72) 0%, transparent 55%);
  opacity: 0;
  transition: opacity 0.5s ease;
  z-index: 1;
  display: flex;
  align-items: flex-end;
  padding: 1.5rem;
}
.card:hover .card-overlay { opacity: 1; }

.overlay-btn {
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  border: 1px solid var(--gold-dim);
  padding: 0.5rem 1.2rem;
  transform: translateY(8px);
  transition: transform 0.4s 0.1s ease, background 0.3s, color 0.3s;
  cursor: pointer;
}
.card:hover .overlay-btn { transform: translateY(0); }
.overlay-btn:hover { background: var(--gold); color: var(--bg); }

.card-body {
  padding: 1.4rem 1.5rem 1.6rem;
  border-top: 1px solid var(--border);
  position: relative;
}

.card-body::after {
  content: '';
  position: absolute;
  bottom: 0; left: 1.5rem;
  width: 0; height: 1px;
  background: var(--gold);
  transition: width 0.5s ease;
}
.card:hover .card-body::after { width: calc(100% - 3rem); }

.card-category {
  font-size: 0.58rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 0.4rem;
}

.card-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 300;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 0.9rem;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-price {
  font-size: 0.8rem;
  font-weight: 300;
  letter-spacing: 0.1em;
  color: var(--gold-light);
}

.card-num {
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 0.15em;
}

footer {
  border-top: 1px solid var(--border);
  padding: 3rem 5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-wordmark {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
}

.footer-ornament { display: flex; align-items: center; gap: 0.8rem; }
.fo-line { width: 40px; height: 1px; background: var(--border-strong); }
.fo-diamond { width: 4px; height: 4px; background: var(--gold-dim); transform: rotate(45deg); }

.footer-tagline {
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 1100px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 768px) {
  header, nav, .collection-intro, .grid-wrap, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
  .wordmark { font-size: 2rem; letter-spacing: 0.2em; }
  .grid { grid-template-columns: repeat(2, 1fr); }
  .collection-intro { flex-direction: column; gap: 1rem; align-items: flex-start; }
  nav { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-line right"></div>
  </div>
  <div class="wordmark">Ma<em>i</em>son</div>
  <div class="tagline">Objects of Enduring Refinement</div>
  <div class="header-border"></div>
</header>

<nav>
  <ul class="nav-links">
    <li><a href="#">Collection</a></li>
    <li><a href="#">Atelier</a></li>
    <li><a href="#">Provenance</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
  <a href="#" class="nav-cta">Private Access</a>
</nav>

<div class="collection-intro">
  <div>
    <div class="collection-label">Autumn — Winter</div>
    <div class="collection-heading">The <em>Quiet</em><br>Collection</div>
  </div>
  <div class="collection-meta">
    <p>Eight Pieces</p>
    <p>Limited Edition</p>
    <p>Handcrafted</p>
  </div>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<footer>
  <span class="footer-wordmark">Maison</span>
  <div class="footer-ornament">
    <div class="fo-line"></div>
    <div class="fo-diamond"></div>
    <div class="fo-line"></div>
  </div>
  <span class="footer-tagline">All prices in USD &nbsp;·&nbsp; Complimentary shipping</span>
</footer>

<script>
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSD8U0P_BSPLIbkIVgfwmqdp9_b-lVvN4117Fzs311AytF_IjRJDvGjkoSUqMqUKgWciTNuF9RUi3P6/pub?output=csv';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g, ''));
  return lines.slice(1).map(line => {
    // Handle quoted fields with commas inside
    const cols = [];
    let current = '';
    let inQuotes = false;
    for (let ch of line) {
      if (ch === '"') { inQuotes = !inQuotes; }
      else if (ch === ',' && !inQuotes) { cols.push(current.trim()); current = ''; }
      else { current += ch; }
    }
    cols.push(current.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || '').replace(/"/g, '').trim());
    return obj;
  }).filter(row => row.name);
}

function renderCard(p, i) {
  const badge = p.badge && p.badge.toLowerCase() !== 'null' && p.badge !== '' ? p.badge : null;
  const num = String(i + 1).padStart(2, '0');
  return `
    <div class="card">
      <div class="img-wrap">
        <img src="${p.img}" alt="${p.name}" loading="lazy">
        ${badge ? `<span class="badge">${badge}</span>` : ''}
        <div class="card-overlay">
          <div class="overlay-btn">Discover</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-category">${p.category}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-footer">
          <span class="card-price">${p.price}</span>
          <span class="card-num">${num}</span>
        </div>
      </div>
    </div>`;
}

function showError(msg) {
  const grid = document.getElementById('grid');
  grid.innerHTML = `<div style="grid-column:1/-1;padding:3rem;text-align:center;color:var(--muted);font-size:0.8rem;letter-spacing:0.2em;">${msg}</div>`;
}

async function loadProducts() {
  const grid = document.getElementById('grid');
  grid.innerHTML = `<div style="grid-column:1/-1;padding:3rem;text-align:center;color:var(--muted);font-size:0.75rem;letter-spacing:0.25em;text-transform:uppercase;">Loading collection…</div>`;

  try {
    const res = await fetch(SHEET_CSV_URL);
    if (!res.ok) throw new Error('Network error');
    const text = await res.text();
    const products = parseCSV(text);
    if (!products.length) { showError('No products found in sheet.'); return; }
    grid.innerHTML = products.map((p, i) => renderCard(p, i)).join('');
  } catch (err) {
    showError('Unable to load products. Please check your sheet URL and sharing settings.');
    console.error(err);
  }
}

loadProducts();
</script>
</body>
</html>
